name: Build and Deploy to GPU VM

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  # Converts repository name to lowercase automatically
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Login to GitHub Container Registry
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository name to lowercase
        run: echo "IMAGE_NAME_LOWER=${IMAGE_NAME,,}" >> $GITHUB_ENV

      # Build and push to ghcr.io
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest

  deploy-to-vm:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # Determine lowercase repo name internally
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            
            # Login to GitHub Container Registry on the VM
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull the latest image
            docker pull ghcr.io/$REPO_LOWER:latest
            
            # Stop the existing container if it exists
            docker stop mediguide-app || true
            docker rm mediguide-app || true
            
            # Run the new container with GPU access and persistent storage volumes
            docker run -d --name mediguide-app \
              --gpus all \
              -p 80:8080 \
              -v $HOME/rag_data:/app/data \
              -v $HOME/rag_indexes:/app/indexes \
              --restart unless-stopped \
              ghcr.io/$REPO_LOWER:latest
